name: Android CI (Build & Lint)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # The real google-services.json is gitignored (kept out of the public repo).
      # The google-services Gradle plugin still needs a structurally valid file to
      # build, so CI writes a placeholder with dummy (non-secret) values.
      - name: Generate placeholder google-services.json
        run: echo '{"project_info":{"project_number":"000000000000","project_id":"ci-placeholder","storage_bucket":"ci-placeholder.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000000000","android_client_info":{"package_name":"com.ai_health.assistant"}},"oauth_client":[],"api_key":[{"current_key":"AIzaSyCIPLACEHOLDERKEYnotARealSecret000000"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > app/google-services.json

      - name: Run Lint
        run: ./gradlew lintDebug

      - name: Build with Gradle
        run: ./gradlew assembleDebug
